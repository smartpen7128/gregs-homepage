<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
    <!-- Fluent UI CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@fluentui/web-components@2/dist/web-components.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Bookmark Manager</h1>
            <fluent-button id="add-column-btn" appearance="primary">Add Column</fluent-button>
        </header>
        <div id="columns-container" class="columns-container">
            <!-- Columns will be added here -->
        </div>
    </div>

    <!-- Fluent UI JS -->
    <script src="https://unpkg.com/@fluentui/web-components@2/dist/web-components.min.js"></script>
    <!-- SortableJS for drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
